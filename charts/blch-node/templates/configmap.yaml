apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "blch-node.fullname" . }}-config-overlay
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "blch-node.labels" . | nindent 4 }}
data:
  config-overlay-defaults.toml: |
    {{- if eq .Values.blch.nodeType "sentry" }}
    priv_validator_laddr = "tcp://0.0.0.0:1234"
    {{- end }}
    {{- if .Values.blch.config }}
    {{- if .Values.blch.config.seeds }}
    seeds = {{ .Values.blch.config.seeds | quote }}
    {{- end }}
    {{- if .Values.blch.config.peers }}
    peers = {{ .Values.blch.config.peers | quote }}
    {{- end }}
    {{- if .Values.blch.config.kvIndexerEnabled }}
    [tx_index]
    indexer = "kv"
    {{- end }}
    {{- end }}
  {{- if .Values.p2pDNSNameEnabled }}
  {{- range $i := until (int .Values.replicas) }}
  config-overlay-defaults-{{ include "blch-node.fullname" $ }}-{{ $i }}.toml: |
    [p2p]
    external_address = "{{ include "blch-node.fullname" $ }}-{{ $i }}.{{ $.Values.endpointsBaseDomain }}:26656"
  {{- end }}
  {{- end }}
  {{- with .Values.configOverrides }}
  {{- with .allnodes }}
  config-overlay-overrides.toml: |
    {{- .overrides | nindent 4 }}
  {{- end }}
  {{- with .pernode }}
  {{- range . }}
  config-overlay-overrides-{{ include "blch-node.fullname" $ }}-{{ .podOrdinal }}.toml: |
    {{- .overrides | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- end }}
  app-overlay-defaults.toml: |
    minimum-gas-prices = {{ .Values.blch.minGasPrice | quote }}
    {{- if eq .Values.blch.nodeType "archive"}}
    pruning = "nothing"
    {{- else if .Values.blch.pruning.strategy }}
    pruning = {{ .Values.blch.pruning.strategy }}
    {{- else }}
    pruning = "default"
    {{- end }}
    {{- if .Values.blch.pruning.keepRecent }}
    pruning-keep-recent = {{ .Values.blch.pruning.keepRecent | quote }}
    {{- end }}
    {{- if .Values.blch.pruning.interval }}
    pruning-interval = {{ .Values.blch.pruning.interval | quote }}
    {{- end}}
    {{- if .Values.blch.pruning.keepEvery }}
    pruning-keep-every = {{ .Values.blch.pruning.keepEvery | quote }}
    {{- end }}
  {{- with .Values.appOverrides }}
  {{- with .allnodes }}
  app-overlay-overrides.toml: |
    {{- .overrides | nindent 4 }}
  {{- end }}
  {{- with .pernode }}
  {{- range . }}
  app-overlay-overrides-{{ include "blch-node.fullname" $ }}-{{ .podOrdinal }}.toml: |
    {{- .overrides | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- end }}
